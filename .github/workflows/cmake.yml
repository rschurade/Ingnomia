name: CMake

on: [push, workflow_dispatch]

env:
  # CMake build type (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: RelWithDebInfo
  # Base URL for prebuilt dependency packages
  DEPS_URL: https://github.com/rschurade/IngnomiaBuildDeps/raw/master

jobs:
  build:
    # Windows-only for 0.9.0. The Qt6 + GLAD + Noesis 3.0.12 + C++23 stack has not
    # been validated on Linux yet; a Linux job belongs with the future SDL2/GLFW
    # windowing work, not the release build.
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive   # src/base/beehive

    - name: Get latest CMake
      uses: lukka/get-cmake@latest

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.9.0'
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: 'qtimageformats'
        cache: true

    - name: Fetch dependencies
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        function Get-Dep($url, $out, $dest) {
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $out
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Expand-Archive -Path $out -DestinationPath $dest -Force
        }
        Get-Dep "$env:DEPS_URL/steamworks_sdk_164.zip"               steam.zip    steamworks_sdk
        Get-Dep "$env:DEPS_URL/NoesisGUI-NativeSDK-win-3.0.12.zip"   noesis.zip   noesis_sdk
        Get-Dep "$env:DEPS_URL/openal-1.25.1.zip"                    openal.zip   openal_sdk
        Get-Dep "$env:DEPS_URL/tilesheet.zip"                        tiles.zip    content
        Get-Dep "$env:DEPS_URL/audio.zip"                            audio.zip    content

    - name: Create build directory
      run: cmake -E make_directory build

    - name: Configure CMake
      working-directory: ${{ github.workspace }}/build
      shell: pwsh
      env:
        NOESIS_LICENSE_KEY: ${{ secrets.NOESIS_LICENSE_KEY }}
        NOESIS_LICENSE_NAME: ${{ secrets.NOESIS_LICENSE_NAME }}
      run: |
        # BugSplat is intentionally disabled: its SDK header uses set_unexpected,
        # removed in C++23. Matches the local/release build, which omits BUGSPLAT_DB.
        $ws = "${{ github.workspace }}".Replace('\','/')
        cmake -S .. -B . `
          -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
          -DCMAKE_INSTALL_BINDIR="." `
          -DSTEAM_SDK_ROOT="$ws/steamworks_sdk/sdk" `
          -DNOESIS_ROOT="$ws/noesis_sdk" `
          -DOPENAL_ROOT="$ws/openal_sdk" `
          -DNOESIS_LICENSE_NAME="$env:NOESIS_LICENSE_NAME" `
          -DNOESIS_LICENSE_KEY="$env:NOESIS_LICENSE_KEY" `
          -DGIT_REPO="${{ github.repository }}" `
          -DGIT_REF="${{ github.ref }}" `
          -DGIT_SHA="${{ github.sha }}" `
          -DBUILD_ID="${{ github.run_id }}"

    - name: Build
      working-directory: ${{ github.workspace }}/build
      run: cmake --build . --config ${{ env.BUILD_TYPE }} --target Ingnomia

    - name: Install
      working-directory: ${{ github.workspace }}/build
      run: cmake --install . --prefix ../install --config ${{ env.BUILD_TYPE }}

    - uses: actions/upload-artifact@v4
      with:
        name: "windows-${{ github.run_id }}"
        path: |
          install/
          !**/*.iobj
          !**/*.ipdb
